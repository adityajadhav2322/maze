<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Maze for Fatemeh</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Comic Sans MS', 'Fredoka One', cursive, sans-serif;
            background-color: #fff0f3; /* Soft pastel pink */
            margin-top: 30px;
            color: #c9184a;
        }
        h1 {
            margin-bottom: 5px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(255, 179, 198, 0.5);
        }
        p {
            margin-bottom: 20px;
            color: #ff748c;
            font-size: 1.1rem;
        }
        canvas {
            background-color: #ffffff;
            box-shadow: 0 12px 24px rgba(255, 143, 171, 0.3);
            border-radius: 15px;
            border: 6px solid #ffb3c6;
        }
        #message {
            margin-top: 20px;
            font-size: 2rem;
            font-weight: bold;
            color: #ff4d6d;
            height: 40px;
            text-shadow: 1px 1px 3px rgba(255, 77, 109, 0.3);
        }
        .controls {
            margin-top: 10px;
            font-size: 0.95rem;
            color: #ff8fab;
        }
    </style>
</head>
<body>

    <h1>Find Your Way! 🎀</h1>
    <p>Use your <strong>Arrow Keys</strong> to guide the ❤️ to the 💌</p>
    
    <!-- Increased canvas size and grid size for a harder maze -->
    <canvas id="mazeCanvas" width="600" height="600"></canvas>
    
    <div id="message"></div>
    <div class="controls">Refresh the page to generate a new maze.</div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const messageEl = document.getElementById('message');

        // Harder Maze settings
        const cols = 35; // Increased columns for difficulty
        const rows = 35; // Increased rows for difficulty
        const w = canvas.width / cols;
        const h = canvas.height / rows;

        let grid = [];
        let stack = [];
        let player = { i: 0, j: 0 };
        let goal = { i: cols - 1, j: rows - 1 };
        let gameWon = false;

        // Cell Class
        class Cell {
            constructor(i, j) {
                this.i = i;
                this.j = j;
                this.walls = [true, true, true, true]; // top, right, bottom, left
                this.visited = false;
            }

            show() {
                const x = this.i * w;
                const y = this.j * h;
                
                ctx.strokeStyle = "#ffb3c6"; // Cute pink walls
                ctx.lineWidth = 2.5;
                ctx.lineCap = "round";
                
                if (this.walls[0]) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + w, y); ctx.stroke(); }
                if (this.walls[1]) { ctx.beginPath(); ctx.moveTo(x + w, y); ctx.lineTo(x + w, y + h); ctx.stroke(); }
                if (this.walls[2]) { ctx.beginPath(); ctx.moveTo(x + w, y + h); ctx.lineTo(x, y + h); ctx.stroke(); }
                if (this.walls[3]) { ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x, y); ctx.stroke(); }
            }

            checkNeighbors() {
                let neighbors = [];
                const top = grid[index(this.i, this.j - 1)];
                const right = grid[index(this.i + 1, this.j)];
                const bottom = grid[index(this.i, this.j + 1)];
                const left = grid[index(this.i - 1, this.j)];

                if (top && !top.visited) neighbors.push(top);
                if (right && !right.visited) neighbors.push(right);
                if (bottom && !bottom.visited) neighbors.push(bottom);
                if (left && !left.visited) neighbors.push(left);

                if (neighbors.length > 0) {
                    const r = Math.floor(Math.random() * neighbors.length);
                    return neighbors[r];
                } else {
                    return undefined;
                }
            }
        }

        function index(i, j) {
            if (i < 0 || j < 0 || i > cols - 1 || j > rows - 1) return -1;
            return i + j * cols;
        }

        function removeWalls(a, b) {
            const x = a.i - b.i;
            if (x === 1) { a.walls[3] = false; b.walls[1] = false; }
            else if (x === -1) { a.walls[1] = false; b.walls[3] = false; }
            
            const y = a.j - b.j;
            if (y === 1) { a.walls[0] = false; b.walls[2] = false; }
            else if (y === -1) { a.walls[2] = false; b.walls[0] = false; }
        }

        // Initialize Grid
        for (let j = 0; j < rows; j++) {
            for (let i = 0; i < cols; i++) {
                grid.push(new Cell(i, j));
            }
        }

        // Generate Maze (Depth-First Search)
        let current = grid[0];
        current.visited = true;
        let generating = true;

        while (generating) {
            let next = current.checkNeighbors();
            if (next) {
                next.visited = true;
                stack.push(current);
                removeWalls(current, next);
                current = next;
            } else if (stack.length > 0) {
                current = stack.pop();
            } else {
                generating = false;
            }
        }

        // Render Game
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Maze
            for (let i = 0; i < grid.length; i++) {
                grid[i].show();
            }

            // Text settings for emojis
            ctx.font = (w * 0.7) + "px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Draw Goal (Love Letter Emoji)
            const goalX = goal.i * w + w / 2;
            const goalY = goal.j * h + h / 2 + 1;
            ctx.fillText("💌", goalX, goalY);

            // Draw Player (Heart Emoji)
            const playerX = player.i * w + w / 2;
            const playerY = player.j * h + h / 2 + 1;
            ctx.fillText("❤️", playerX, playerY);
        }

        // Initial Draw
        draw();

        // Handle Player Movement
        window.addEventListener('keydown', (e) => {
            if (gameWon) return; 
            
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }

            const currentCell = grid[index(player.i, player.j)];
            let moved = false;

            if (e.key === "ArrowUp" && !currentCell.walls[0]) { player.j--; moved = true; }
            else if (e.key === "ArrowRight" && !currentCell.walls[1]) { player.i++; moved = true; }
            else if (e.key === "ArrowDown" && !currentCell.walls[2]) { player.j++; moved = true; }
            else if (e.key === "ArrowLeft" && !currentCell.walls[3]) { player.i--; moved = true; }

            if (moved) {
                draw();
                // Check Win Condition with new message
                if (player.i === goal.i && player.j === goal.j) {
                    gameWon = true;
                    messageEl.innerText = "💖 i love you fatemeh 💖";
                }
            }
        });
    </script>
</body>
</html>
