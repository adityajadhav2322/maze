<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin-top: 40px;
            color: #333;
        }
        h1 {
            margin-bottom: 5px;
        }
        p {
            margin-bottom: 20px;
            color: #666;
        }
        canvas {
            background-color: #fff;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-radius: 4px;
            border: 4px solid #2c3e50;
        }
        #message {
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #27ae60;
            height: 30px;
        }
        .controls {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Canvas Maze Game</h1>
    <p>Use your <strong>Arrow Keys</strong> to reach the green goal!</p>
    
    <canvas id="mazeCanvas" width="400" height="400"></canvas>
    
    <div id="message"></div>
    <div class="controls">Refresh the page to generate a new maze.</div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const messageEl = document.getElementById('message');

        // Maze settings
        const cols = 20; // Number of columns
        const rows = 20; // Number of rows
        const w = canvas.width / cols;
        const h = canvas.height / rows;

        let grid = [];
        let stack = [];
        let player = { i: 0, j: 0 };
        let goal = { i: cols - 1, j: rows - 1 };
        let gameWon = false;

        // Cell Class
        class Cell {
            constructor(i, j) {
                this.i = i;
                this.j = j;
                this.walls = [true, true, true, true]; // top, right, bottom, left
                this.visited = false;
            }

            show() {
                const x = this.i * w;
                const y = this.j * h;
                
                ctx.strokeStyle = "#2c3e50";
                ctx.lineWidth = 2;
                ctx.lineCap = "round";
                
                if (this.walls[0]) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + w, y); ctx.stroke(); }
                if (this.walls[1]) { ctx.beginPath(); ctx.moveTo(x + w, y); ctx.lineTo(x + w, y + h); ctx.stroke(); }
                if (this.walls[2]) { ctx.beginPath(); ctx.moveTo(x + w, y + h); ctx.lineTo(x, y + h); ctx.stroke(); }
                if (this.walls[3]) { ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x, y); ctx.stroke(); }
            }

            checkNeighbors() {
                let neighbors = [];
                const top = grid[index(this.i, this.j - 1)];
                const right = grid[index(this.i + 1, this.j)];
                const bottom = grid[index(this.i, this.j + 1)];
                const left = grid[index(this.i - 1, this.j)];

                if (top && !top.visited) neighbors.push(top);
                if (right && !right.visited) neighbors.push(right);
                if (bottom && !bottom.visited) neighbors.push(bottom);
                if (left && !left.visited) neighbors.push(left);

                if (neighbors.length > 0) {
                    const r = Math.floor(Math.random() * neighbors.length);
                    return neighbors[r];
                } else {
                    return undefined;
                }
            }
        }

        // Helper function to get 1D array index from 2D coordinates
        function index(i, j) {
            if (i < 0 || j < 0 || i > cols - 1 || j > rows - 1) return -1;
            return i + j * cols;
        }

        // Helper function to carve a path between two cells
        function removeWalls(a, b) {
            const x = a.i - b.i;
            if (x === 1) { a.walls[3] = false; b.walls[1] = false; }
            else if (x === -1) { a.walls[1] = false; b.walls[3] = false; }
            
            const y = a.j - b.j;
            if (y === 1) { a.walls[0] = false; b.walls[2] = false; }
            else if (y === -1) { a.walls[2] = false; b.walls[0] = false; }
        }

        // 1. Initialize Grid
        for (let j = 0; j < rows; j++) {
            for (let i = 0; i < cols; i++) {
                grid.push(new Cell(i, j));
            }
        }

        // 2. Generate Maze (Depth-First Search Recursive Backtracker)
        let current = grid[0];
        current.visited = true;
        let generating = true;

        while (generating) {
            let next = current.checkNeighbors();
            if (next) {
                next.visited = true;
                stack.push(current);
                removeWalls(current, next);
                current = next;
            } else if (stack.length > 0) {
                current = stack.pop();
            } else {
                generating = false; // Maze is complete
            }
        }

        // 3. Render Game
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Maze
            for (let i = 0; i < grid.length; i++) {
                grid[i].show();
            }

            // Draw Goal (Green)
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(goal.i * w + 4, goal.j * h + 4, w - 8, h - 8);

            // Draw Player (Red)
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(player.i * w + 4, player.j * h + 4, w - 8, h - 8);
        }

        // Initial Draw
        draw();

        // 4. Handle Player Movement
        window.addEventListener('keydown', (e) => {
            if (gameWon) return; // Stop movement if game is won
            
            // Prevent default scrolling for arrow keys
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }

            const currentCell = grid[index(player.i, player.j)];
            let moved = false;

            if (e.key === "ArrowUp" && !currentCell.walls[0]) { player.j--; moved = true; }
            else if (e.key === "ArrowRight" && !currentCell.walls[1]) { player.i++; moved = true; }
            else if (e.key === "ArrowDown" && !currentCell.walls[2]) { player.j++; moved = true; }
            else if (e.key === "ArrowLeft" && !currentCell.walls[3]) { player.i--; moved = true; }

            if (moved) {
                draw();
                // Check Win Condition
                if (player.i === goal.i && player.j === goal.j) {
                    gameWon = true;
                    messageEl.innerText = "🎉 You Win!";
                }
            }
        });
    </script>
</body>
</html>
